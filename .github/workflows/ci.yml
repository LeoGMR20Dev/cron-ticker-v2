env:
  NODE_VERSION: "24"
  APP_NAME: cron-ticker-v2

jobs:
  # ------JOB 1 LINT-------

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{env.NODE_VERSION}}
          cache: "npm"
      - run: npm ci
      - run: npm run lint

  # # ------JOB 2 TESTS -------

  # test:
  #   name: Tests
  #   runs-on: ubuntu-latest
  #   needs: lint
  #   steps:
  #     - uses: actions/checkout@v4
  #     - uses: actions/setup-node@v4
  #       with:
  #         node-version: ${{env.NODE_VERSION}}
  #         cache: "npm"
  #     - run: npm ci
  #     - name: Run tests with coverage
  #       run: npm run test:coverage
  #     - name: coverage report
  #       uses: actions/upload-artifact@v4
  #       if: always()
  #       with:
  #         name: coverage-${{github.sha}}
  #         path: coverage/
  #         retention-days: 3

  test:
    name: 🧪 Tests + Coverage
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{env.NODE_VERSION}}
          cache: "npm"
      - run: npm ci
      - name: Run tests with coverage
        run: npm run test:coverage
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-${{ github.sha }}
          path: coverage/
          retention-days: 7

  # ------JOB 3 BUILD-------
  
  build:
    runs-on: ubuntu-latest

    env:
      BUILD_DIR: dist
    
    steps:
      - uses: actions/checkout@v4

      - name: Show local variables
        run: |
          echo "App: ${{env.APP_NAME}}, Node: ${{env.NODE_VERSION}}"
      
      - name: Show github variables
        run: |
          echo "App: ${{vars.APP_VERSION}}"

      - name: Show github secrets
        run: |
          echo "Secret: ${{secrets.API_KEY}}"

      - name: Show github functions
        run: |
          echo "${{toJson(github)}}"

      - run: npm ci
      - name: build
        run: npm run build
        env:
          APP_VERSION: "${{vars.APP_VERSION}}"

  summary:
    name: ✅ Summary
    runs-on: ubuntu-latest
    needs: [lint, test, build]
    if: always()
    steps:
      - name: Pipeline result
        run: |
          echo '================================='
          echo '  PIPELINE SUMMARY'
          echo '================================='
          echo '  Lint:  ${{ needs.lint.result }}'
          echo '  Test:  ${{ needs.test.result }}'
          echo '  Build: ${{ needs.build.result }}'
          echo '================================='
          echo '  Commit: ${{ github.sha }}'
          echo '  Branch: ${{ github.ref_name }}'
          echo '  Actor:  ${{ github.actor }}'
          echo '================================='

